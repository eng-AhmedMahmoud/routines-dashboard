<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" fill="none">
  <defs>
    <radialGradient id="bg" cx="35%" cy="30%" r="90%">
      <stop offset="0%" stop-color="#1b2540"/>
      <stop offset="55%" stop-color="#0d1424"/>
      <stop offset="100%" stop-color="#05070d"/>
    </radialGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f8dff"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="ringDim" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f8dff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0.45"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- rounded square background -->
  <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224" fill="url(#bg)"/>

  <!-- subtle inner ring highlight -->
  <rect x="8" y="8" width="1008" height="1008" rx="216" ry="216"
        fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="2"/>

  <!-- outer ring (open at top-right — suggests loop/cron interruption point) -->
  <circle cx="512" cy="512" r="330"
          fill="none" stroke="url(#ring)" stroke-width="34" stroke-linecap="round"
          stroke-dasharray="1750 250"
          transform="rotate(-90 512 512)"
          filter="url(#glow)"/>

  <!-- middle ring, dashed (schedule ticks) -->
  <circle cx="512" cy="512" r="245"
          fill="none" stroke="url(#ringDim)" stroke-width="14" stroke-linecap="round"
          stroke-dasharray="4 46"
          transform="rotate(-90 512 512)"/>

  <!-- inner ring solid -->
  <circle cx="512" cy="512" r="160"
          fill="none" stroke="#e7ecf2" stroke-width="10" stroke-opacity="0.9"/>

  <!-- center play triangle (fire routine now) -->
  <path d="M 470 445 L 470 579 L 590 512 Z"
        fill="#e7ecf2" stroke="#e7ecf2" stroke-width="4" stroke-linejoin="round"/>

  <!-- accent dot at top-right of outer ring (status indicator) -->
  <circle cx="765" cy="255" r="30" fill="#22c55e" filter="url(#glow)"/>
  <circle cx="765" cy="255" r="16" fill="#e7ecf2"/>
</svg>

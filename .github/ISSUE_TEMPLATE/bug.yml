name: Bug report
description: Something is broken or behaves unexpectedly
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open dashboard
        2. Click X
        3. See Y
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: "14.5 Sonoma"
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node version (`node -v`)
      placeholder: "v20.10.0"
    validations:
      required: true
  - type: dropdown
    id: pane
    attributes:
      label: Which pane?
      options:
        - launchd
        - cloud (Claude Code Remote)
        - both / dashboard chrome
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / screenshots
      description: Browser console, server stdout, or a screenshot. Redact secrets.
